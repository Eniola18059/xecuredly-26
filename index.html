<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xecuredly Academy | Secure Access Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00E5A0;
            --primary-dark: #00B37D;
            --primary-light: #7FFFD4;
            --accent: #0066FF;
            --accent-purple: #8B5CF6;
            --bg-primary: #0A0E1A;
            --bg-secondary: #111827;
            --bg-tertiary: #1F2937;
            --bg-elevated: #2D3748;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --text-tertiary: #9CA3AF;
            --border: #374151;
            --border-light: #4B5563;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary), transparent);
            top: -200px;
            right: -200px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent), transparent);
            bottom: -150px;
            left: -150px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--accent-purple), transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -30px) scale(1.1);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.9);
            }
            75% {
                transform: translate(20px, 30px) scale(1.05);
            }
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 160, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 160, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--accent-purple));
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 40px rgba(0, 229, 160, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 40px rgba(0, 229, 160, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 60px rgba(0, 229, 160, 0.6);
            }
        }

        .logo-icon svg {
            width: 45px;
            height: 45px;
            fill: white;
        }

        .logo-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: var(--text-tertiary);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Welcome Text */
        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .welcome-description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Form */
        .login-form {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            padding-left: 3.5rem;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
            opacity: 0.5;
            letter-spacing: 1px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-elevated);
            box-shadow: 0 0 0 4px rgba(0, 229, 160, 0.1);
        }

        .form-input.error {
            border-color: var(--error);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .input-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-tertiary);
        }

        .form-input:focus + .input-icon svg {
            stroke: var(--primary);
        }

        .form-hint {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-hint svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-tertiary);
        }

        /* Alert */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: flex;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .alert svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1.125rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 229, 160, 0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 160, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .security-badge svg {
            width: 18px;
            height: 18px;
            fill: var(--primary);
        }

        .support-link {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-tertiary);
        }

        .support-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .support-link a:hover {
            color: var(--primary-light);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
            }

            .logo-title {
                font-size: 1.75rem;
            }

            .welcome-title {
                font-size: 1.25rem;
            }
        }

        /* Loading State */
        .btn-loading {
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                </div>
                <h1 class="logo-title">XECUREDLY</h1>
                <p class="logo-subtitle">Security Academy</p>
            </div>

            <!-- Welcome Text -->
            <div class="welcome-text">
                <h2 class="welcome-title">Secure Access Portal</h2>
                <p class="welcome-description">
                    Enter your unique access code to begin your cybersecurity training journey
                </p>
            </div>

            <!-- Alert Messages -->
            <div id="alert-container"></div>

            <!-- Login Form -->
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="access-code">Access Code</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="access-code" 
                            class="form-input" 
                            placeholder="XXXXX-XX"
                            maxlength="15"
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                    </div>
                    <div class="form-hint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                        Enter the access code provided by your administrator
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span>Access Academy</span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <div class="security-badge">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l7-3.11v8.8z"/>
                    </svg>
                    <span>256-bit SSL Encrypted</span>
                </div>
                <div class="support-link">
                    Need help? <a href="mailto:support@xecuredly.com">Contact Support</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Valid access codes - add more as needed
        const validAccessCodes = [
            'OLAWALE-20',
            'OLAWALE20',  // Allow without hyphen too
        ];

        // Always clear any existing session when the login page loads
        localStorage.removeItem('user');

        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            const icon = type === 'success' 
                ? '<polyline points="20 6 9 17 4 12"></polyline>'
                : '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';
            
            container.innerHTML = `
                <div class="alert ${alertClass} show">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        ${icon}
                    </svg>
                    <span>${message}</span>
                </div>
            `;

            setTimeout(() => {
                const alert = container.querySelector('.alert');
                if (alert) alert.classList.remove('show');
            }, 5000);
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const input = document.getElementById('access-code');
            const submitBtn = document.getElementById('submit-btn');
            const accessCode = input.value.trim().toUpperCase();

            // Clear previous error state
            input.classList.remove('error');

            // Validate input
            if (!accessCode) {
                input.classList.add('error');
                showAlert('Please enter your access code', 'error');
                return;
            }

            // Show loading state
            submitBtn.classList.add('btn-loading');
            submitBtn.innerHTML = '';

            // Simulate authentication delay
            setTimeout(() => {
                // Check if code is valid
                if (validAccessCodes.includes(accessCode)) {
                    showAlert('Access granted! Redirecting...', 'success');
                    
                    // Store session info (no loggedIn flag — login is required every time)
                    const user = {
                        email: accessCode + '@xecuredly.com',
                        name: accessCode.split('-')[0],
                        accessCode: accessCode,
                        loginTime: new Date().toISOString()
                    };
                    localStorage.setItem('user', JSON.stringify(user));

                    // Redirect to dashboard after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    // Invalid code
                    input.classList.add('error');
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.innerHTML = '<span>Access Academy</span>';
                    showAlert('Invalid access code. Please check and try again.', 'error');
                    input.value = '';
                    input.focus();
                }
            }, 1000);
        }

        // Format input as user types (add hyphen automatically)
        document.getElementById('access-code').addEventListener('input', function(e) {
            let value = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            
            // Auto-format with hyphen
            if (value.length > 0 && !value.includes('-')) {
                // Find where to put the hyphen (after letters, before numbers)
                const letters = value.match(/[A-Z]+/);
                const numbers = value.match(/[0-9]+/);
                
                if (letters && numbers) {
                    value = letters[0] + '-' + numbers[0];
                }
            }
            
            e.target.value = value;
        });

        // Allow Enter key to submit
        document.getElementById('access-code').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
